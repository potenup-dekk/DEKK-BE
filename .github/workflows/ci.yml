name: DEKK Project CI

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Java 21 (Corretto) 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle' 

      - name: 3. Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. 테스트 및 빌드 수행
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew clean build -Dspring.profiles.active=test

      - name: 5. 빌드 결과 확인
        run: ls -l build/libs/*.jar
