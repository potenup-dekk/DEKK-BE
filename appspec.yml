version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/dekk-was
    overwrite: yes

permissions:
  - object: /
    pattern: "**"
    owner: ec2-user
    group: ec2-user

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: ec2-user
  ApplicationStart:
    - location: scripts/deploy.sh
      timeout: 60
      runas: ec2-user
  ValidateService:
    - location: scripts/health_check.sh
      timeout: 60
      runas: ec2-user
