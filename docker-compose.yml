services:
  postgres:
    image: postgres:16-alpine
    container_name: dekk-postgres
    restart: always
    ports:
      - "65432:5432"
    environment:
      POSTGRES_USER: dekk_user
      POSTGRES_PASSWORD: dekk_password
      POSTGRES_DB: dekk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dekk-network

  redis:
    image: redis:7-alpine
    container_name: dekk-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dekk-network

  n8n:
    image: n8nio/n8n:latest
    container_name: dekk-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: dekk-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - dekk-network

  loki:
    image: grafana/loki:3.1.0
    container_name: dekk-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - dekk-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - dekk-network

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  dekk-network:
    driver: bridge
