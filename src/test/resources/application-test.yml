spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=USER,ROLE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-client-id
            client-secret: dummy-client-secret
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

cloud:
  aws:
    credentials:
      instance-profile: false
    region:
      static: ap-northeast-2
    stack:
      auto: false

app:
  oauth2:
    redirect-uri: "http://localhost:3000/oauth2/redirect"
    login-page: "http://localhost:3000/login"
    join-page: "http://localhost:3000/join"
  cors:
    allowed-origins: "http://localhost:3000"
  cookie:
    domain: .test.co.kr
    secure: true

jwt:
  secret: "dGhpcy1pcy1hLWR1bW15LXNlY3JldC1rZXktZm9yLXRlc3RpbmctcHVycG9zZXMtb25seS0xMjM="
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 604800
  admin-access-token-validity-in-seconds: 3600

worker:
  n8n:
    webhook-url: "http://dummy-n8n-url/webhook"
